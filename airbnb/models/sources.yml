version: 1

sources:
  - name: airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count:1, period:hour}

  - name: jaffle_shop
    schema: jaffle_shop
    tables: 
      - name: customers

      - name: orders

  - name: stripe
    schema: stripe
    tables: 
      - name: payment
    