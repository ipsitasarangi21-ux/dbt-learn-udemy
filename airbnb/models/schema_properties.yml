version: 1

models:
  - name: dim_listings_cleansed
    description: Cleansed table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_cnt: 100000
          severity: warn
        
    columns: 
      - name: listing_id
        description: Primary key for the listing
        data_tests:
          - not_null
          - unique

      - name: room_type
        description: Type of the apartment / room
        data_tests:
          - accepted_values:
              arguments:
                values: ['Shared room','Private room','Hotel room','Villa','Entire home/apt']

      - name: minimum_nights
        data_tests:
          - positive_values


 
  

  - name: dim_hosts_cleansed
    description: Cleansed table constaining host information
    columns: 
      - name: host_id
        description: primary key for the host
        data_tests:
          - not_null
          - unique

      - name: host_name
        description: Stores the name of the host
        data_tests:
          - not_null
          

      - name: is_superhost
        description: specifies if host is a superhost or not
        data_tests:
          - accepted_values:
              arguments:
                values: ['t','f']  

  